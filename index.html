<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整形外科クリニック</title>

<style>
body {
    margin: 0;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f7f9f7;
    color: #333;
}

/* ヘッダー */
header {
    background: linear-gradient(135deg, rgba(120,180,120,0.9), rgba(200,240,200,0.7));
    backdrop-filter: blur(6px);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
header h1 {
    margin: 0;
    font-size: 26px;
    color: #fff;
    letter-spacing: 2px;
}
nav a {
    margin-left: 20px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
}

/* メインビジュアル */
.hero {
    height: 380px;
    background: url("images/main.jpg") center/cover no-repeat;
    position: relative;
}
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,80,40,0.25), rgba(200,255,200,0.25));
}
.hero-text {
    position: absolute;
    bottom: 40px;
    left: 40px;
    color: #fff;
    font-size: 32px;
    font-weight: 700;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* セクション */
section {
    padding: 60px 40px;
    max-width: 900px;
    margin: auto;
}
section h2 {
    font-size: 24px;
    border-left: 6px solid #7bbf7b;
    padding-left: 12px;
    margin-bottom: 20px;
}

/* カード */
.card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 30px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    border-left: 6px solid #a8d8a8;
}

/* フッター */
footer {
    background: #e8f2e8;
    padding: 20px;
    text-align: center;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<header>
    <h1>整形外科クリニック</h1>
    <nav>
        <a href="#about">当院について</a>
        <a href="#services">診療内容</a>
        <a href="#access">アクセス</a>
    </nav>
</header>

<div class="hero">
    <div class="hero-text">地域に寄り添う整形外科医療</div>
</div>

<section id="about">
    <h2>当院について</h2>
    <div class="card">
        <p>当院は地域の皆さまに寄り添い、丁寧で質の高い整形外科医療を提供しています。</p>
    </div>
</section>

<section id="services">
    <h2>診療内容</h2>
    <div class="card">
        <p>・一般整形外科<br>
           ・リハビリテーション<br>
           ・スポーツ外傷<br>
           ・骨粗鬆症治療</p>
    </div>
</section>

<section id="access">
    <h2>アクセス</h2>
    <div class="card">
        <p>東京都世田谷区 ○○丁目<br>
           最寄駅：○○駅 徒歩5分</p>
    </div>
</section>

<footer>
    © 整形外科クリニック
</footer>

</body>
</html>
