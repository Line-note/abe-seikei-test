<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿部整形外科 - ホーム</title>

    <!-- しっぽり明朝 -->
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #E8F2E2;
            font-family: "Shippori Mincho", serif;
            margin: 0;
        }

        /* ★ sougen.jpg を header 背景に使用 ★ */
        header {
            color: white;
            padding: 40px 20px;
            text-align: center;

            background-image: url("sougen.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            position: relative;
        }

        /* ★ 文字を読みやすくするための薄い透明レイヤー */
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.18);
            z-index: 0;
        }

        header h1, header p {
            position: relative;
            z-index: 1;
            margin: 0;
            font-weight: 700;
        }

        nav {
            background: #3fae6c;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 18px;
            text-decoration: none;
            font-weight: 700;
            font-family: "Shippori Mincho", serif;
            white-space: nowrap;
        }

        img {
            border-radius: 8px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: white;
        }

        h2 {
            color: #6A8F4E;
            border-left: 6px solid #E39A3B;
            padding-left: 10px;
            font-weight: 700;
        }

        ul {
            line-height: 1.8;
        }

        footer {
            background: #2e8b57;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>阿部整形外科</h1>
    <p>地域に根ざした整形外科クリニック</p>
</header>
