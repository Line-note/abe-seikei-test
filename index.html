  <style>
    body {
      margin: 0;
      font-family: "Shippori Mincho", serif;
      background-color: #f9fff9;
    }

    header {
      background: url("leaf.jpg") center/cover no-repeat;
      padding: 40px 0;
      text-align: center;
    }

    header img {
      display: block;
      margin: 0 auto;
      max-width: 600px;
      width: 75%;
      box-shadow: none;
    }

    /* ▼ nav に葉模様（IMG_2366.png）を左右に配置（微調整版） ▼ */
    nav {
      background-color: #3fae6c;
      position: relative;
      padding: 12px;
      text-align: center;
      overflow: hidden;
    }

    nav::before,
    nav::after {
      content: "";
      position: absolute;
      top: 20px; /* ← 全体を下へ */
      width: 240px;
      height: 100%;
      background-image: url("IMG_2366.png");
      background-repeat: no-repeat;
      background-size: contain;
      background-position: top;
      opacity: 1;
      pointer-events: none;
      z-index: 1;
    }

    nav::before {
      left: 0px; /* ← 左はそのまま */
      background-position: left top;
    }

    nav::after {
      right: 40px; /* ← 右をもっと右へ（外側へ） */
      background-position: right top;
    }

    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      position: relative;
      z-index: 2;
    }

    nav img {
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    img {
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .container,
    .normal-section {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f4fff4;
      border-radius: 10px;
      color: #003300;
    }

    h2 {
      color: #1f6b3f;
      border-left: 6px solid #1f6b3f;
      padding-left: 10px;
      font-weight: 700;
    }

    .new-badge {
      background: #E39A3B;
      color: white;
      font-size: 0.8em;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    footer {
      background: #2e8b57;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
