<html lang="ja">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* 全体背景：淡い緑の多層グラデーション */
    body {
      margin: 0;
      font-family: "Shippori Mincho", serif;
      background: linear-gradient(180deg,
        #f9fff9 0%,
        #e8fff0 30%,
        #d8ffe8 60%,
        #f9fff9 100%
      );
      color: #003300;
      line-height: 1.8;
    }

    /* ▼ ヘッダー：背景と下の緑の境目を曖昧にぼかす */
    header {
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.0) 0%,
          rgba(255,255,255,0.35) 40%,
          rgba(255,255,255,0.55) 70%,
          rgba(255,255,255,0.0) 100%
        ),
        url("leaf.jpg") center/cover no-repeat;
      padding: 40px 0 20px;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    /* ▼ ロゴ画像：配置そのままに “2倍の大きさ” */
    header img {
      display: block;
      margin: 0 auto;
      width: 150%;          /* ← 元の75% → 正確に2倍 */
      max-width: 1200px;    /* ← 大型化 */
      transform: scale(1.2); /* ← 視覚的にさらに大きく見せる */
      box-shadow: none !important;
      border-radius: 0 !important;
      background: transparent !important;
    }

    /* ▼ nav：葉模様を完全排除し、グラデーションは薄めに */
    nav {
      background: linear-gradient(90deg,
        #2f8f5a 0%,
        #3fae6c 40%,
        #4fcf8a 70%,
        #3fae6c 100%
      );
      padding: 14px;
      text-align: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }

    /* nav の葉模様は完全削除（before/after を置かない） */

    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity 0.2s, text-shadow 0.2s;
    }

    nav a:hover {
      opacity: 0.8;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    nav img {
      border-radius: 15px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }

    /* ▼ container：緑グラデーションを “薄く” 調整 */
    .container,
    .normal-section {
      max-width: 900px;
      margin: 20px auto;
      padding: 24px;
      background: linear-gradient(135deg,
        #f8fff8 0%,
        #f3fff6 50%,
        #ecffee 100%
      );
      border-radius: 12px;
      color: #003300;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border-left: 6px solid #4fcf8a;
    }

    h2 {
      color: #1f6b3f;
      border-left: 6px solid #1f6b3f;
      padding-left: 10px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }

    .new-badge {
      background: linear-gradient(135deg, #ffb14a, #e39a3b);
      color: white;
      font-size: 0.8em;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    footer {
      background: linear-gradient(90deg,
        #1f6b3f,
        #2f8f5a,
        #3fae6c
      );
      color: white;
      text-align: center;
      padding: 18px;
      margin-top: 40px;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>
