<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿部整形外科 - ホーム</title>

  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* 全体背景：深緑〜白緑の多層グラデーション */
    body {
      margin: 0;
      font-family: "Shippori Mincho", serif;
      background: linear-gradient(180deg,
        #f9fff9 0%,
        #e8fff0 30%,
        #d8ffe8 60%,
        #f9fff9 100%
      );
      color: #003300;
      line-height: 1.8;
    }

    /* ▼ ヘッダー：ロゴ背景の浮き上がりを完全に消す ▼ */
    header {
      background:
        linear-gradient(135deg, rgba(80,150,80,0.25), rgba(200,255,200,0.15)),
        url("leaf.jpg") center/cover no-repeat;
      padding: 40px 0;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    /* ロゴ画像：影・白枠を完全に削除して背景と一体化 */
    header img {
      display: block;
      margin: 0 auto;
      max-width: 600px;
      width: 75%;
      box-shadow: none !important;
      border-radius: 0 !important;
      background: transparent !important;
    }

    /* ▼ nav：深緑→青緑→黄緑の強いグラデーションに変更 ▼ */
    nav {
      background: linear-gradient(90deg,
        #1f6b3f 0%,
        #2f8f5a 25%,
        #3fae6c 50%,
        #4fcf8a 75%,
        #3fae6c 100%
      );
      position: relative;
      padding: 14px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }

    /* ▼ nav の葉模様：スタイリッシュに再設計 ▼ */
    nav::before,
    nav::after {
      content: "";
      position: absolute;
      top: 10px;
      width: 260px;
      height: 160%;
      background-image: url("IMG_2366.png");
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.35; /* ← 透明度を下げて高級感 */
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
      pointer-events: none;
      z-index: 1;
      transform: rotate(-8deg); /* ← 角度をつけてデザイン性UP */
    }

    nav::before {
      left: -20px;
    }

    nav::after {
      right: -20px;
      transform: rotate(8deg);
    }

    /* nav 内のリンク */
    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      position: relative;
      z-index: 2;
      transition: opacity 0.2s, text-shadow 0.2s;
    }

    nav a:hover {
      opacity: 0.8;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    /* nav 内のロビー画像 */
    nav img {
      border-radius: 15px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    /* 全画像共通 */
    img {
      border-radius: 15px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    /* ▼ container：淡い緑の多層グラデーションに強化 ▼ */
    .container,
    .normal-section {
      max-width: 900px;
      margin: 20px auto;
      padding: 24px;
      background: linear-gradient(135deg,
        #f4fff4 0%,
        #eafff0 40%,
        #e0ffe8 100%
      );
      border-radius: 12px;
      color: #003300;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border-left: 6px solid #4fcf8a;
    }

    /* 見出し：深緑＋光のライン */
    h2 {
      color: #1f6b3f;
      border-left: 6px solid #1f6b3f;
      padding-left: 10px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }

    /* NEW バッジ */
    .new-badge {
      background: linear-gradient(135deg, #ffb14a, #e39a3b);
      color: white;
      font-size: 0.8em;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    /* ▼ フッター：深緑→明緑の光沢グラデーション ▼ */
    footer {
      background: linear-gradient(90deg,
        #1f6b3f,
        #2f8f5a,
        #3fae6c
      );
      color: white;
      text-align: center;
      padding: 18px;
      margin-top: 40px;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>
