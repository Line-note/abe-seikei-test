<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿部整形外科 - ホーム</title>

  <!-- 医療サイト向けの清潔感あるフォント -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-dark: #1f6b3f;
      --green-mid: #3fae6c;
      --green-light: #e9f7ef;
      --text-main: #1a1a1a;
      --text-sub: #3a3a3a;
      --radius: 14px;
      --shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background-color: #ffffff;
      color: var(--text-main);
      line-height: 1.8;
    }

    /* =========================
       ヘッダー（ロゴ＋背景）
    ========================== */
    header {
      background: url("leaf.jpg") center/cover no-repeat;
      padding: 80px 20px;
      text-align: center;
    }

    header img {
      width: 60%;
      max-width: 420px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* =========================
       ナビゲーション
    ========================== */
    nav {
      background-color: var(--green-dark);
      padding: 14px 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      color: #ffffff;
      margin: 0 18px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      transition: 0.2s;
    }

    nav a:hover {
      opacity: 0.7;
    }

    /* ロビー写真（ナビ下に配置） */
    .nav-photo {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: block;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 20px;
    }

    /* =========================
       セクション共通
    ========================== */
    .section {
      max-width: 900px;
      margin: 50px auto;
      padding: 40px 30px;
      border-radius: var(--radius);
      background: var(--green-light);
      box-shadow: var(--shadow);
    }

    h2 {
      color: var(--green-dark);
      font-weight: 600;
      border-left: 6px solid var(--green-dark);
      padding-left: 12px;
      margin-bottom: 25px;
      font-size: 1.4rem;
    }

    /* NEWバッジ */
    .new-badge {
      background: #E39A3B;
      color: white;
      font-size: 0.8em;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* =========================
       フッター
    ========================== */
    footer {
      background: var(--green-dark);
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
      font-size: 0.9rem;
    }

    /* =========================
       スマホ最適化
    ========================== */
    @media (max-width: 600px) {
      nav a {
        margin: 0 10px;
        font-size: 0.95rem;
      }

      .section {
        padding: 30px 20px;
      }

      header img {
        width: 80%;
      }
    }
  </style>
</head>

<body>

  <!-- ヘッダー（ロゴ） -->
  <header>
    <img src="IMG_2354.png" alt="阿部整形外科ロゴ">
  </header>

  <!-- ナビゲーション -->
  <nav>
    <a href="news.html">お知らせ</a>
    <a href="shinryo.html">診療案内</a>
    <a href="doctor.html">医師紹介</a>
    <a href="facility.html">施設紹介</a>
    <a href="access.html">アクセス</a>
  </nav>

  <!-- ロビー写真 -->
  <img src="robi.jpg" alt="ロビー写真" class="nav-photo">

  <!-- お知らせ -->
  <div class="section">
    <h2>お知らせ（最新5件）</h2>
    <ul>
      <li><a href="news.html">4月4日土曜日休診のお知らせ</a> <span class="new-badge">NEW!</span></li>
      <li>令和2年8月に骨密度測定器を最新にしました</li>
      <li><a href="access.html#parking">提携駐車場のご案内</a></li>
      <li>理学療法は専門的な運動療法を行っております</li>
      <li>ホームページ稼働し始めました</li>
    </ul>
  </div>

  <!-- 診療時間・所在地 -->
  <div class="section">
    <h2>診療時間</h2>
    <p>
      月〜金：9:00〜12:30 / 15:00〜18:30<br>
      土曜：9:00〜12:30<br>
      休診日：木曜・日曜・祝日
    </p>

    <h2>所在地</h2>
    <p>
      〒157-0073 東京都世田谷区砧3-4-3 グリーンモール砧1F<br>
      電話：03-5727-3725
    </p>
  </div>

  <footer>
    © 2026 阿部整形外科
  </footer>

</body>
</html>
